domain: NEARLINK_SERVICE

# nearLink dft event begin
NEARLINK_SWITCH_EXCEPTION:
  __BASE: {type: STATISTIC, level: CRITICAL, desc: nearlink switch exception event}
  SWITCH_TYPE_INFO: {type: UINT16, desc: switch close|open|reset|restore}
  SWITCH_OPER_RES: {type: UINT16, desc: operation result success or fail}
  SWITCH_ERR_CODE: {type: UINT16, desc: operation failed error code}
  SWITCH_INFO_MSG: {type: STRING, desc: operation result info message}
  SWITCH_USED_APP: {type: STRING, desc: who operated nearlink}
  SWITCH_START_TIME: {type: STRING, desc: nearlink switch oper start time}
  SWITCH_END_TIME: {type: STRING, desc: nearlink switch oper end time}
  SUB_STATE_FLOW: {type: STRING, desc: sub event switch state flow}

NEARLINK_DISCONN_EXCEPTION:
