{
    "jobs" : [{
            "name" : "post-fs-data",
            "cmds" : [
                "mkdir /data/log/nearlink",
                "chown nearlink nearlink /data/log/nearlink",
                "mkdir /data/service/el1/public/nearlink 0700 nearlink nearlink",
                "mkdir /data/vendor/nearlink 0770 nearlink_host nearlink_host"
            ]
        }, {
            "name" : "param:reset-nearlink-service",
            "condition" : "persist.nearlink.reset_service=*",
            "cmds" : [
                "reset nearlink_service"
            ]
        }
    ],
    "services" : [{
            "name" : "nearlink_service",
            "path" : ["/system/bin/sa_main", "/system/profile/nearlink_service.json"],
            "uid" : "nearlink",
            "gid" : ["nearlink", "shell", "wakelock", "uhid", "radio"],
            "ondemand" : true,
            "caps" : ["CAP_NET_ADMIN", "CAP_SYS_NICE", "CAP_WAKE_ALARM", "CAP_BLOCK_SUSPEND"],
            "secon" : "u:r:nearlink_service:s0",
            "permission" : [
                "ohos.permission.ACCESS_NEARLINK",
                "ohos.permission.MANAGE_NEARLINK",
                "ohos.permission.GET_NEARLINK_LOCAL_MAC",
                "ohos.permission.GET_NEARLINK_PEER_MAC",
                "ohos.permission.PERMISSION_USED_STATS",
                "ohos.permission.MANAGE_SECURE_SETTINGS",
                "ohos.permission.ACCESS_SYSTEM_SETTINGS",
                "ohos.permission.ACCESS_SERVICE_DM",
                "ohos.permission.MANAGE_MEDIA_RESOURCES",
                "ohos.permission.MODIFY_AUDIO_SETTINGS",
                "ohos.permission.MANAGE_AUDIO_CONFIG",
                "ohos.permission.MANAGE_SETTINGS",
                "ohos.permission.GET_TELEPHONY_STATE",
                "ohos.permission.ANSWER_CALL",
                "ohos.permission.GET_NETWORK_INFO",
                "ohos.permission.MANAGE_LOCAL_ACCOUNTS",
                "ohos.permission.DISTRIBUTED_DATASYNC",
                "ohos.permission.GET_BUNDLE_INFO",
                "ohos.permission.START_ABILITIES_FROM_BACKGROUND",
                "ohos.permission.REPORT_SECURITY_EVENT",
                "ohos.permission.RECEIVE_UPDATE_MESSAGE",
                "ohos.permission.ACCESS_CMAP_SERVICE",
                "ohos.permission.REPORT_RESOURCE_SCHEDULE_EVENT",
                "ohos.permission.MANAGE_ACCESSORY",
                "ohos.permission.ACCELEROMETER",
                "ohos.permission.GYROSCOPE"
            ]
        }
    ]
}
